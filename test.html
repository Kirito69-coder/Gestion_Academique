<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - Plateforme Académique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/sheets/bootstrap.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container">
    <div class="row vh-100 d-flex justify-content-center align-items-center">

      <div class="col-12 col-md-6 col-lg-4">
        <div class="card border-0 shadow-lg rounded-4">
          <div class="card-body p-5">

            <div class="text-center mb-4">
              <h3 class="fw-bold">Connexion</h3>
              <p class="text-muted">Plateforme de Gestion Académique</p>
            </div>

            <form>

              <div class="mb-3">
                <label class="form-label">Adresse Email</label>
                <input type="email" class="form-control" placeholder="exemple@email.com">
              </div>

              <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" class="form-control" placeholder="********">
              </div>

              <div class="d-grid mb-3">
                <a href="dashboard.html" class="btn btn-primary w-100">Se connecter</a>
              </div>

              <div class="text-center">
                <small class="text-muted">© 2026 Plateforme Académique</small>
              </div>

            </form>

          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
